workflows:
  ios-unsigned:
    name: KOBPAY iOS Unsigned
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.kob.kobpay
        API_BASE_URL: https://kobpay-codex-backend.onrender.com
    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $HOME/Library/Caches/CocoaPods
        - ios/Pods
        - build
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: true
      cancel_previous_builds: true
    scripts:
      - name: Show tool versions
        script: |
          flutter --version
          xcodebuild -version
          pod --version
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: find ios -name "Podfile" -execdir pod install \;
      - name: Build iOS app without code signing
        script: |
          flutter build ios --release --no-codesign \
            --build-name=0.1.1 \
            --build-number=$BUILD_NUMBER \
            --dart-define=API_BASE_URL=$API_BASE_URL
    artifacts:
      - build/ios/iphoneos/*.app
      - /tmp/xcodebuild_logs/*.log

  ios-app-store:
    name: KOBPAY iOS App Store
    instance_type: mac_mini_m2
    max_build_duration: 90
    integrations:
      app_store_connect: KOBPAY_APP_STORE_CONNECT
    environment:
      groups:
        - app_store_credentials
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.kob.kobpay
      vars:
        API_BASE_URL: https://kobpay-codex-backend.onrender.com
    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $HOME/Library/Caches/CocoaPods
        - ios/Pods
        - build
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
      cancel_previous_builds: true
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: find ios -name "Podfile" -execdir pod install \;
      - name: Apply provisioning profiles
        script: xcode-project use-profiles
      - name: Build signed IPA
        script: |
          BUILD_NUMBER=$(($(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID") + 1))
          flutter build ipa --release \
            --build-name=0.1.1 \
            --build-number=$BUILD_NUMBER \
            --dart-define=API_BASE_URL=$API_BASE_URL
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - talk2bette@gmail.com
        notify:
          success: true
          failure: true
